# countries/si.yaml — Slovenia Climate Explorer
# Single source of truth for the Slovenia deploy.
# Copy this file to countries/<cc>.yaml to add another country.

code: si
name: Slovenia
timezone: Europe/Ljubljana
default_location: Ljubljana
languages: [en, sl]
default_language: en

data_start_date: "1950-01-01"
baseline:          { start: 1950, end: 1980 }
trend_start_year:  1950
projection_end_year: 2050

map:
  center_lat: 46.1
  center_lon:  14.8
  zoom:         7      # tune after first render (browser console: mapChart.mapView.zoom)

branding:
  site_title:     "Slovenia Climate Explorer"
  domain:         "podnebje.kesma.wtf"
  chatbot_name:   ""
  chatbot_avatar: ""

features:
  regression_chart:    true
  trend_calendar:      true
  station_map:         true
  hero_cards:          true
  today_section:       true
  season_heat_heatmap: true
  spei_heatmap:        true
  drought_trend_chart: true   # WIP — off everywhere for now
  chatbot:             false   # no Azure Direct Line for Slovenia
  welcome_modal:       true
  next_episodes_teaser: true
  mk2036_section:      false   # TODO: create si2035 impacts section — future phase
  analytics_export:    false

stations:
  - { name: Ljubljana,          lat: 46.0511, lon: 14.5051, elevation: 299  }
  - { name: Maribor,            lat: 46.5547, lon: 15.6459, elevation: 270  }
  - { name: Celje,              lat: 46.2313, lon: 15.2617, elevation: 241  }
  - { name: Kranj,              lat: 46.2392, lon: 14.3556, elevation: 387  }
  - { name: Koper,              lat: 45.5483, lon: 13.7300, elevation: 10   }
  - { name: Novo_Mesto,         lat: 45.8011, lon: 15.1700, elevation: 220  }
  - { name: Murska_Sobota,      lat: 46.6625, lon: 16.1667, elevation: 189  }
  - { name: Nova_Gorica,        lat: 45.9564, lon: 13.6431, elevation: 94   }
  - { name: Postojna,           lat: 45.7756, lon: 14.2133, elevation: 549  }
  - { name: Ptuj,               lat: 46.4197, lon: 15.8697, elevation: 228  }
  - { name: Velenje,            lat: 46.3592, lon: 15.1119, elevation: 405  }
  - { name: Trbovlje,           lat: 46.1511, lon: 15.0511, elevation: 230  }
  - { name: Tolmin,             lat: 46.1858, lon: 13.7317, elevation: 194  }
  - { name: Kocevje,            lat: 45.6433, lon: 14.8619, elevation: 467  }
  - { name: Ilirska_Bistrica,   lat: 45.5667, lon: 14.2358, elevation: 440  }
  - { name: Domzale,            lat: 46.1375, lon: 14.5942, elevation: 301  }
