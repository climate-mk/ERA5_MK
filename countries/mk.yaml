# Single source of truth for North Macedonia.
# Copy this file to countries/<cc>.yaml to add a new country.
# All values that were previously hardcoded in mk_collect.py and mk_api.py
# live here. Both collect.py and api.py will read from this file in step 2.

code: mk
name: North Macedonia
timezone: Europe/Skopje
default_location: Skopje
languages: [en, mk, sq]
default_language: mk

# ── Climatology / methodology windows ─────────────────────────────────────────
data_start_date: "1950-01-01"
baseline:
  start: 1950
  end:   1980
trend_start_year: 1950
projection_end_year: 2050

# ── Map (Highcharts station-dot map) ──────────────────────────────────────────
map:
  center_lat: 41.6
  center_lon: 21.7
  zoom: 7.1

# ── Branding ──────────────────────────────────────────────────────────────────
branding:
  site_title: "North Macedonia Climate Explorer"
  domain: "climate.mk"
  chatbot_name: "Ognen"
  chatbot_avatar: "images/Ognen100.png"

# ── Feature toggles ───────────────────────────────────────────────────────────
# Set any feature to false to hide it from the UI, disable its endpoint,
# and suppress its help/FAQ entries. Missing keys default to false.
features:
  regression_chart:      true   # regression scatter + trend line
  trend_calendar:        true   # year-round daily trend calendar bars
  station_map:           true   # station map coloured by slope
  hero_cards:            true   # per-location summary verdict cards
  today_section:         true   # "Is it hot today?" + annual trend chart
  season_heat_heatmap:   true   # seasonal heat ranking heatmap
  spei_heatmap:          true   # seasonal drought index (SPEI) heatmap
  drought_trend_chart:   true   # per-station SPEI trend chart (WIP)
  chatbot:               true   # Ognen AI assistant (Azure Direct Line)
  welcome_modal:         true   # welcome/onboarding modal on first visit
  next_episodes_teaser:  true   # "In the next episodes…" teaser section
  mk2036_section:        true   # Macedonia 2036 projected impacts section
  analytics_export:      true   # /api/analytics/export + /api/analytics/chat

# ── Stations ──────────────────────────────────────────────────────────────────
# Single source of truth — mk_collect.py and mk_api.py both read from here.
# lat/lon are ERA5-Land grid points; elevation_m is the real station elevation
# used for lapse-rate temperature correction (+0.0065 °C/m).
stations:
  - { name: Skopje,       lat: 41.9965, lon: 21.4314, elevation_m: 240  }
  - { name: Bitola,       lat: 41.0314, lon: 21.3347, elevation_m: 589  }
  - { name: Ohrid,        lat: 41.1231, lon: 20.8016, elevation_m: 695  }
  - { name: Tetovo,       lat: 42.0092, lon: 20.9714, elevation_m: 468  }
