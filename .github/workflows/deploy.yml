name: Deploy to production

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          cat >> ~/.ssh/config << 'EOF'
          Host 46.224.208.142
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Deploy via rsync
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv' \
            --exclude='data' \
            --exclude='deploy.sh' \
            --exclude='*.sqlite' \
            ./ root@46.224.208.142:/opt/mk_climate/

      - name: Write .env
        run: |
          ssh root@46.224.208.142 "cat > /opt/mk_climate/.env << 'EOF'
          DIRECT_LINE_SECRET=${{ secrets.DIRECT_LINE_SECRET }}
          ANALYTICS_EXPORT_KEY=${{ secrets.ANALYTICS_EXPORT_KEY }}
          EOF
          chmod 600 /opt/mk_climate/.env"

      - name: Install dependencies & restart service
        run: |
          ssh root@46.224.208.142 "
            cd /opt/mk_climate &&
            venv/bin/pip install -q -r requirements.txt &&
            chown -R www-data:www-data /opt/mk_climate &&
            systemctl restart mk_climate &&
            sleep 4 &&
            systemctl is-active mk_climate
          "

      - name: Install cron job
        run: |
          ssh root@46.224.208.142 "
            cp /opt/mk_climate/cron/mk_collect /etc/cron.d/mk_climate &&
            chmod 644 /etc/cron.d/mk_climate &&
            echo 'Cron installed:' &&
            cat /etc/cron.d/mk_climate
          "

      - name: Health check
        run: |
          sleep 5
          ssh root@46.224.208.142 "curl -sf http://localhost:5050/api/meta" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Health OK —', len(d['locations']), 'locations loaded')
          "

      - name: Warm slow caches
        run: |
          echo "Warming SPEI station seasonal cache (can take several minutes)..."
          ssh root@46.224.208.142 "curl -sf http://localhost:5050/api/spei_station_seasonal > /dev/null && echo 'spei_station_seasonal: OK'"
          ssh root@46.224.208.142 "curl -sf http://localhost:5050/api/spei_heatmap > /dev/null && echo 'spei_heatmap: OK'"
          ssh root@46.224.208.142 "curl -sf http://localhost:5050/api/season_heatmap > /dev/null && echo 'season_heatmap: OK'"
