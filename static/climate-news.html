<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Климатски вести — climate.mk</title>
  <link rel="alternate" type="application/rss+xml" title="Климатски вести — climate.mk" href="/rss/climate_news.xml">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:     #F5F2EC;
      --paper-2:   #EFEBE2;
      --card:      #FFFFFF;
      --ink:       #0E0E0C;
      --ink-soft:  #6B655B;
      --ink-faint: #ABA59A;
      --rule:      rgba(14,14,12,0.08);
      --rule-2:    rgba(14,14,12,0.14);
      --accent:    #C25A2C;
      --radius:    14px;
      --max-w:     720px;
    }

    html { scroll-padding-top: 80px; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 14px 40px;
      display: flex; align-items: center; gap: 20px;
    }
    .topbar a.home { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
    .topbar a.home:hover { color: var(--accent); }
    .topbar-sep { color: var(--ink-faint); }
    .topbar-title { font-weight: 600; font-size: 15px; color: var(--ink); }
    .topbar-rss { margin-top: 0; }
    #share-widget { position: relative; flex-shrink: 0; margin-left: auto; }
    #share-toggle {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--rule); background: var(--card);
      color: var(--ink-soft); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }
    #share-toggle:hover { color: var(--ink); background: var(--paper-2); }
    #share-popover {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--card); border: 1px solid var(--rule);
      border-radius: 8px; box-shadow: 0 4px 18px rgba(0,0,0,0.11);
      padding: 5px; min-width: 155px;
      display: flex; flex-direction: column; gap: 1px;
    }
    #share-popover[hidden] { display: none; }
    #share-popover a, #share-popover button {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: 5px;
      font-family: 'Space Grotesk', sans-serif; font-size: 13px;
      color: var(--ink-soft); text-decoration: none;
      background: none; border: none; cursor: pointer; width: 100%; text-align: left;
      transition: background 0.12s, color 0.12s;
    }
    #share-popover a:hover, #share-popover button:hover { background: var(--paper); color: var(--ink); }
    #share-popover svg { flex-shrink: 0; color: var(--ink-faint); }

    /* ── Layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 40px 40px 80px; display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap; }
    .col-news { flex: 1 1 480px; min-width: 0; max-width: var(--max-w); }
    .col-x { flex: 0 1 360px; min-width: 280px; }

    h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .section-sub { color: var(--ink-soft); font-size: 14px; margin-bottom: 28px; }
    h2 { font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft); margin-bottom: 16px; font-family: 'JetBrains Mono', monospace; }

    /* ── News cards ── */
    .news-list { display: flex; flex-direction: column; gap: 14px; }
    .news-card {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      text-decoration: none;
      color: var(--ink);
      transition: border-color 0.15s ease;
    }
    .news-card:hover { border-color: var(--accent); }
    .news-card .news-thumb { width: 96px; height: 72px; flex-shrink: 0; border-radius: 8px; object-fit: cover; background: var(--paper-2); }
    .news-card .news-thumb-fallback { object-fit: contain; padding: 20px; }
    .news-card .news-body { flex: 1; min-width: 0; }
    .news-card .news-title { font-weight: 600; font-size: 15px; margin-bottom: 8px; line-height: 1.4; }
    .news-meta { display: flex; gap: 10px; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-faint); letter-spacing: 0.02em; }
    .news-meta .news-source { color: var(--accent); }
    .news-origin-tag {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 2px 6px; border-radius: 4px;
      background: var(--paper-2); color: var(--ink-faint);
    }

    .state-msg { color: var(--ink-soft); font-size: 14px; padding: 20px 0; }

    /* ── X column ── */
    .x-panel {
      background: var(--card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 16px;
      position: sticky;
      top: 80px;
    }
    .x-fallback-link {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 12px;
      color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px;
    }
    .x-fallback-link:hover { text-decoration: underline; }

    .footer { border-top: 1px solid var(--rule); padding: 20px 40px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-faint); text-align: center; letter-spacing: 0.06em; }

    @media (max-width: 780px) {
      .topbar { padding: 12px 16px; }
      .page { padding: 24px 16px 60px; flex-direction: column; }
      .col-x { flex-basis: auto; width: 100%; }
      .x-panel { position: static; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

  </aside>

<footer class="footer">climate.mk — климатски вести од јавно достапни извори</footer>

<script>
  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('mk-MK', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch (e) {
      return '';
    }
  }

  function faviconUrl(link) {
    try {
      const domain = new URL(link).hostname;
      return 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=64';
    } catch (e) {
      return '';
    }
  }

  function renderCard(item) {
    const a = document.createElement('a');
    a.className = 'news-card';
    a.href = item.link;
    a.target = '_blank';
    a.rel = 'noopener';

    const img = document.createElement('img');
    img.className = 'news-thumb';
    img.alt = '';
    img.loading = 'lazy';
    if (item.image) {
      img.src = item.image;
      img.onerror = function () { img.src = faviconUrl(item.link); img.classList.add('news-thumb-fallback'); img.onerror = function () { img.remove(); }; };
    } else {
      const favicon = faviconUrl(item.link);
      if (favicon) {
        img.src = favicon;
        img.classList.add('news-thumb-fallback');
        img.onerror = function () { img.remove(); };
      }
    }
    if (img.src) a.appendChild(img);

    const body = document.createElement('div');
    body.className = 'news-body';

    const title = document.createElement('div');
    title.className = 'news-title';
    title.textContent = item.title;

    const meta = document.createElement('div');
    meta.className = 'news-meta';
    const source = document.createElement('span');
    source.className = 'news-source';
    source.textContent = item.source || '';
    const date = document.createElement('span');
    date.textContent = fmtDate(item.published);
    meta.appendChild(source);
    meta.appendChild(date);
    const originLabels = { google: 'Google', bing: 'Bing' };
    const tag = document.createElement('span');
    tag.className = 'news-origin-tag';
    tag.textContent = originLabels[item.origin] || 'RSS';
    meta.appendChild(tag);

    body.appendChild(title);
    body.appendChild(meta);
    a.appendChild(body);
    return a;
  }

  function byNewestFirst(a, b) {
    return new Date(b.published) - new Date(a.published);
  }

  fetch('/api/climate_news')
    .then(function (resp) {
      if (resp.status === 204) return [];
      if (!resp.ok) throw new Error('bad response');
      return resp.json();
    })
    .then(function (items) {
      const state = document.getElementById('news-state');
      if (!items || !items.length) {
        state.textContent = 'Моментално нема достапни вести.';
        return;
      }
      state.remove();

      const list = document.getElementById('news-list');
      items.slice().sort(byNewestFirst).forEach(function (item) {
        list.appendChild(renderCard(item));
      });
    })
    .catch(function () {
      document.getElementById('news-state').textContent = 'Грешка при вчитување на вестите.';
    });

  // ── Share widget ──
  document.addEventListener('click', function (e) {
    const popover = document.getElementById('share-popover');
    if (!popover) return;
    if (e.target.closest('#share-toggle')) {
      e.stopPropagation();
      popover.hidden = !popover.hidden;
      return;
    }
    if (e.target.closest('#share-copy')) {
      navigator.clipboard.writeText(window.location.href).then(function () {
        const lbl = document.getElementById('share-copy-lbl');
        if (!lbl) return;
        const orig = lbl.textContent;
        lbl.textContent = 'Копирано!';
        setTimeout(function () { lbl.textContent = orig; }, 1500);
      });
      return;
    }
    if (!e.target.closest('#share-popover')) popover.hidden = true;
  });
</script>
